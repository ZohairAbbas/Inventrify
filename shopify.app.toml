# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "75071b2e0d8e6a444cabb16b41eb06ae"
name = "Inventorify"
application_url = "https://inventorify.growzar.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks"

[access_scopes]
scopes = "write_products,read_orders,read_inventory,write_inventory"

[auth]
redirect_urls = [ "https://inventorify.growzar.com/api/auth" ]
